name: CI

# Build + test on every push and pull request.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      # the embedded UI isn't committed; provide a placeholder so go:embed compiles
      - run: mkdir -p web/dist && touch web/dist/.gitkeep
      - run: go vet ./...
      - run: go test ./...
      - run: go build ./...

  ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run build
